<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">My account</h1>
      <p class="page-subtitle">Manage your profile, orders, and preferences</p>
    </div>
  </header>

  <div class="settings-sections">
    <section class="settings-card">
      <div class="settings-card__header"><h2>Account settings</h2></div>
      <div class="settings-card__body">
        <button type="button" class="settings-row" (click)="goToPage('resetpassword')">
          <h5>Change password</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
        <button type="button" class="settings-row" (click)="goToPage('profile')">
          <h5>Change profile name</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>

    <section class="settings-card">
      <div class="settings-card__header"><h2>Orders</h2></div>
      <div class="settings-card__body">
        <button type="button" class="settings-row" (click)="goToPage('orderhistory')">
          <h5>Order history</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>

    <section class="settings-card">
      <div class="settings-card__header"><h2>Wishlist</h2></div>
      <div class="settings-card__body">
        <button type="button" class="settings-row" (click)="goToPage('wishlist')">
          <h5>Your wishlist</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>

    <section class="settings-card">
      <div class="settings-card__header"><h2>Addresses</h2></div>
      <div class="settings-card__body">
        <button type="button" class="settings-row" (click)="goToPage('address')">
          <h5>Manage addresses</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>

    <section class="settings-card" *ngIf="isAdmin === 'admin'">
      <div class="settings-card__header"><h2>Admin</h2></div>
      <div class="settings-card__body">
        <button type="button" class="settings-row" (click)="goToPage('products')">
          <h5>Manage products</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
        <button type="button" class="settings-row" (click)="goToPage('category')">
          <h5>Categories</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
        <button type="button" class="settings-row" (click)="goToPage('coupon')">
          <h5>Coupons</h5>
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </section>
  </div>
</div>
