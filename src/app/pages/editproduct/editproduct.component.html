<div class="modal-panel">
  <header class="modal-panel__header">
    <h2>Edit product</h2>
    <p>Update listing details</p>
  </header>
  <div class="modal-panel__body">
    <form [formGroup]="productForm" (ngSubmit)="submitProduct()" class="form-stack">
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Product name</mat-label>
        <input matInput id="name" formControlName="name" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Description</mat-label>
        <textarea matInput id="description" formControlName="description" rows="3"></textarea>
      </mat-form-field>
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Price</mat-label>
        <input matInput id="price" type="number" formControlName="price" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Category</mat-label>
        <input matInput id="category" formControlName="category" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Stock</mat-label>
        <input matInput id="stock" type="number" formControlName="stock" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Image URL</mat-label>
        <input matInput id="img" formControlName="img" />
      </mat-form-field>
      <button type="submit" class="ui-btn ui-btn--primary ui-btn--block" [disabled]="productForm.invalid">Update product</button>
    </form>
  </div>
</div>
