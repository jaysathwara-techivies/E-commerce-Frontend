<div class="auth-page">
  <main class="auth-main" style="width: 100%">
    <div class="auth-card">
      <header class="auth-card__header">
        <h2>Verify phone</h2>
        <p>Enter your mobile number to receive a one-time code</p>
      </header>
      <form class="form-stack">
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Phone number</mat-label>
          <input matInput type="tel" name="num" placeholder="+91 00000 00000" />
          <mat-icon matPrefix>phone</mat-icon>
        </mat-form-field>
        <button type="button" class="auth-submit">Send OTP</button>
      </form>
      <footer class="auth-card__footer">
        <button type="button" class="auth-link auth-link--bold" routerLink="/login">Back to sign in</button>
      </footer>
    </div>
  </main>
</div>
