<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">My wishlist</h1>
      <p class="page-subtitle">{{ wishlist.length }} saved item{{ wishlist.length === 1 ? '' : 's' }}</p>
    </div>
  </header>

  <div class="empty-state" *ngIf="wishlist.length === 0">
    <mat-icon>favorite_border</mat-icon>
    <h2>Your wishlist is empty</h2>
    <p>Save products you love and find them here later.</p>
  </div>

  <div class="store-grid" *ngIf="wishlist.length > 0">
    <article class="store-card" *ngFor="let product of wishlist">
      <div class="store-card__media">
        <img [src]="product.img" [alt]="product.name" />
      </div>
      <div class="store-card__body">
        <h2 class="store-card__title">{{ product.name }}</h2>
        <p class="store-card__desc">{{ product.description }}</p>
        <p class="store-card__price">{{ product.price | currency:'INR':'symbol':'1.0-0' }}</p>
        <div class="store-card__actions">
          <button type="button" class="ui-btn ui-btn--danger ui-btn--icon" (click)="removeFromWishlist(product._id)" aria-label="Remove from wishlist">
            <mat-icon>favorite</mat-icon>
          </button>
        </div>
      </div>
    </article>
  </div>
</div>
