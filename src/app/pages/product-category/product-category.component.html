<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">{{ pageTitle }}</h1>
      <p class="page-subtitle">Browse and shop our curated collection</p>
    </div>
  </header>

  <div class="page-toolbar">
    <div class="search-field">
      <mat-icon>search</mat-icon>
      <input type="search" [(ngModel)]="searchQuery" placeholder="Search products…" aria-label="Search products" />
    </div>
    <select class="ui-select" [(ngModel)]="selectedCategory" aria-label="Filter by category">
      <option value="">All categories</option>
      <option *ngFor="let category of categories" [value]="category.name">{{ category.name }}</option>
    </select>
    <select class="ui-select" [(ngModel)]="sortOption" aria-label="Sort products">
      <option value="name">Sort by name</option>
      <option value="price">Sort by price</option>
    </select>
  </div>

  <div class="store-grid">
    <article class="store-card" *ngFor="let product of paginatedProducts()">
      <div class="store-card__media">
        <img [src]="product.img" [alt]="product.name" />
      </div>
      <div class="store-card__body">
        <h2 class="store-card__title">{{ product.name }}</h2>
        <p class="store-card__desc">{{ product.description }}</p>
        <p class="store-card__price">₹{{ product.price }}</p>
        <div class="store-card__actions">
          <button
            *ngIf="product.stock > 0"
            type="button"
            class="ui-btn ui-btn--primary"
            (click)="addToCart(product)"
            [disabled]="isButtonDisabled(product._id)"
          >
            Add to cart
          </button>
          <span class="store-card__out-of-stock" *ngIf="product.stock <= 0">Out of stock</span>
          <button
            type="button"
            class="ui-btn ui-btn--warning ui-btn--icon"
            (click)="toggleWishlist(product._id)"
          >
            <mat-icon>{{ isProductInWishlist(product._id) ? 'favorite' : 'favorite_border' }}</mat-icon>
          </button>
          <button type="button" class="ui-btn ui-btn--ghost ui-btn--icon" (click)="openReviewModal(product)">
            <mat-icon>rate_review</mat-icon>
          </button>
        </div>
      </div>
    </article>
  </div>

  <nav class="ui-pagination" aria-label="Product pagination" *ngIf="totalPages() > 1">
    <button type="button" (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1">Previous</button>
    <button
      type="button"
      *ngFor="let page of [].constructor(totalPages()); let i = index"
      [class.active]="currentPage === i + 1"
      (click)="changePage(i + 1)"
    >
      {{ i + 1 }}
    </button>
    <button type="button" (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages()">Next</button>
  </nav>
</div>
