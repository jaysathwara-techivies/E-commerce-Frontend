<section class="admin-dashboard">
  <div class="metrics-grid">
    <app-dashboard-metric-card
      *ngFor="let metric of metrics"
      [icon]="metric.icon"
      [title]="metric.title"
      [value]="metric.value"
      [footerIcon]="metric.footerIcon"
      [footerText]="metric.footerText"
      [status]="metric.status">
    </app-dashboard-metric-card>
  </div>
</section>
