<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">Addresses</h1>
      <p class="page-subtitle">Set your default shipping address for checkout</p>
    </div>
  </header>

  <div class="form-card">
    <h2 class="form-card__title">Shipping address</h2>
    <p class="form-card__subtitle">We&apos;ll use this as your default at checkout.</p>
    <form (ngSubmit)="isAddress.length ? updateAddress() : addAddress()">
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Address</mat-label>
        <textarea matInput rows="4" [formControl]="address" placeholder="Street, city, state, PIN"></textarea>
        <mat-icon matPrefix>location_on</mat-icon>
      </mat-form-field>
      <button type="submit" class="ui-btn ui-btn--primary ui-btn--block">
        {{ isAddress.length ? 'Update address' : 'Add address' }}
      </button>
    </form>
  </div>
</div>
