<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">Orders overview</h1>
      <p class="page-subtitle">Manage pending, shipped, and canceled orders</p>
    </div>
  </header>

  <nav class="page-tabs" role="tablist">
    <button type="button" [class.active]="selectedTab === 'pending'" (click)="openTab('pending')">Pending</button>
    <button type="button" [class.active]="selectedTab === 'shipped'" (click)="openTab('shipped')">Shipped</button>
    <button type="button" [class.active]="selectedTab === 'canceled'" (click)="openTab('canceled')">Canceled</button>
  </nav>

  <div class="tab-panel" [class.show]="selectedTab === 'pending'">
    <app-pending-orders></app-pending-orders>
  </div>
  <div class="tab-panel" [class.show]="selectedTab === 'shipped'">
    <app-shipped-orders></app-shipped-orders>
  </div>
  <div class="tab-panel" [class.show]="selectedTab === 'canceled'">
    <app-canceled-orders></app-canceled-orders>
  </div>
</div>
