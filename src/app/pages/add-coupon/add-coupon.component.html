<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">Coupons</h1>
      <p class="page-subtitle">Create discount codes for your store</p>
    </div>
  </header>

  <div class="form-card">
    <h2 class="form-card__title">Add coupon</h2>
    <form [formGroup]="couponForm" (ngSubmit)="submiForm()">
      <div class="form-stack">
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Coupon code</mat-label>
          <input matInput type="text" formControlName="code" placeholder="SUMMER20" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Discount (%)</mat-label>
          <input matInput type="number" formControlName="discount" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Expiry date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="expiryDate" />
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Usage limit</mat-label>
          <input matInput type="number" formControlName="usageLimit" />
        </mat-form-field>
      </div>
      <button type="submit" class="ui-btn ui-btn--primary ui-btn--block" [disabled]="couponForm.invalid" style="margin-top: 8px">
        Add coupon
      </button>
    </form>
  </div>
</div>
