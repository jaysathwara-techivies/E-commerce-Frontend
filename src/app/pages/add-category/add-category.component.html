<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">Categories</h1>
      <p class="page-subtitle">Add and manage product categories</p>
    </div>
  </header>

  <div class="form-card form-card--wide" style="margin-bottom: 32px">
    <h2 class="form-card__title">Add category</h2>
    <form [formGroup]="categoryForm" (ngSubmit)="submiForm()">
      <div class="form-stack">
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Name</mat-label>
          <input matInput type="text" formControlName="name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Description</mat-label>
          <input matInput type="text" formControlName="description" />
        </mat-form-field>
      </div>
      <button type="submit" class="ui-btn ui-btn--primary" style="margin-top: 8px">Add category</button>
    </form>
  </div>

  <h2 class="page-title" style="font-size: 18px; margin-bottom: 16px">All categories</h2>
  <div class="data-table-wrap" *ngIf="categories.length > 0; else noCategories">
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories">
          <td>{{ category.name }}</td>
          <td>{{ category.description }}</td>
          <td>
            <button type="button" class="ui-btn ui-btn--danger ui-btn--icon" (click)="openDialog(category._id)" *ngIf="category.ShowDeleteButton" aria-label="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <ng-template #noCategories>
    <div class="empty-state">
      <mat-icon>category</mat-icon>
      <h2>No categories yet</h2>
      <p>Add your first category above.</p>
    </div>
  </ng-template>
</div>
