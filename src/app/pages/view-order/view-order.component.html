<div class="modal-panel">
  <header class="modal-panel__header">
    <h2>Order items</h2>
    <p>{{ products.length || 0 }} product(s) in this order</p>
  </header>
  <div class="modal-panel__body">
    <div class="store-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr))">
      <article class="store-card" *ngFor="let product of products">
        <div class="store-card__media">
          <img [src]="product.img" [alt]="product.name" />
        </div>
        <div class="store-card__body">
          <h2 class="store-card__title">{{ product.name }}</h2>
          <p class="store-card__desc">{{ product.description }}</p>
          <p class="store-card__price">₹{{ product.price }}</p>
        </div>
      </article>
    </div>
  </div>
</div>
