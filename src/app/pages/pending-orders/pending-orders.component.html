<div class="data-table-wrap" *ngIf="orders.length > 0; else emptyOrders">
  <table class="data-table">
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Customer</th>
        <th>Date</th>
        <th>Total</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let order of orders">
        <td><code style="font-size: 12px">{{ order._id }}</code></td>
        <td *ngFor="let user of order.user">{{ user.name }}</td>
        <td>{{ order.createdAt | date:'mediumDate' }}</td>
        <td>₹{{ order.total }}</td>
        <td>
          <div class="table-actions">
            <button type="button" class="ui-btn ui-btn--ghost ui-btn--sm" (click)="onClickViewOrder(order)">View</button>
            <button type="button" class="ui-btn ui-btn--danger ui-btn--sm" (click)="openDialog(order)">Cancel</button>
            <button type="button" class="ui-btn ui-btn--success ui-btn--sm" (click)="shipOrder(order)">Ship</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<ng-template #emptyOrders>
  <div class="empty-state">
    <mat-icon>inbox</mat-icon>
    <h2>No pending orders</h2>
    <p>All caught up — new orders will appear here.</p>
  </div>
</ng-template>
