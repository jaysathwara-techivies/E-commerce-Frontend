<div class="page-shell">
  <header class="page-header">
    <div>
      <h1 class="page-title">Profile</h1>
      <p class="page-subtitle">Update how your name appears on orders</p>
    </div>
  </header>

  <div class="form-card">
    <h2 class="form-card__title">Change profile name</h2>
    <p class="form-card__subtitle">This name is shown on your account and receipts.</p>
    <form (ngSubmit)="updateName()">
      <mat-form-field appearance="outline" class="auth-field">
        <mat-label>Full name</mat-label>
        <input matInput type="text" [formControl]="name" placeholder="Your name" />
        <mat-icon matPrefix>person_outline</mat-icon>
      </mat-form-field>
      <button type="submit" class="ui-btn ui-btn--primary ui-btn--block">Update name</button>
    </form>
  </div>
</div>
